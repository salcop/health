<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJ 건강 인덱스 - 도서관 색인</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .logo { font-size: 24px; font-weight: bold; color: #0056b3; margin-bottom: 30px; }
        .search-box { width: 90%; max-width: 500px; position: relative; }
        input { width: 100%; padding: 16px 20px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 30px; outline: none; box-shadow: 0 1px 6px rgba(32,33,36,0.28); box-sizing: border-box; }
        button { margin-top: 20px; padding: 12px 24px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; cursor: pointer; font-size: 14px; }
        button:hover { border: 1px solid #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .footer { position: absolute; bottom: 20px; font-size: 12px; color: #70757a; }
    </style>
</head>
<body>
    <div class="logo">SJ 건강 정보 도서관</div>
    <div class="search-box">
        <input type="text" id="query" placeholder="예: 87년생 남자, 요즘 허리가 아픔" onkeypress="if(event.keyCode==13) search()">
    </div>
    <button onclick="search()">데이터 색인 검색</button>
    <div class="footer">© 2026 SJ Health Index. 식약처 공공 데이터 기반</div>

    <script>
        function search() {
            const q = document.getElementById('query').value;
            if(!q) return alert("내용을 입력해주세요.");
            // 실제 운영시에는 검색어를 파라미터로 넘깁니다.
            location.href = `result.html?q=${encodeURIComponent(q)}`;
        }
    </script>
</body>
</html>
